# Render Deployment Configuration
# Backend API Service

services:
  - type: web
    name: campus-event-api
    env: python
    buildCommand: pip install uv && uv sync
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
        hint: Get your free API key from https://console.groq.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

# Frontend will be deployed separately as a Static Site
# Build the React app: cd frontend && npm install && npm run build
# Then deploy the frontend/dist folder to Render Static Sites