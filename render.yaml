# Render Deployment Configuration
# Backend API Service with PostgreSQL

services:
  - type: web
    name: campus-event-api
    env: python
    buildCommand: pip install uv && uv sync
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
        hint: Get your free API key from https://console.groq.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

# PostgreSQL Database
databases:
  - name: campus-event-db
    plan: free